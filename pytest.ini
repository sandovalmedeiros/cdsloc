[pytest]
# Pytest configuration for CDsLoc project

# Test discovery
pythonpath = .
testpaths = app/tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --asyncio-mode=auto

# Markers for test categorization
markers =
    critical: Tests that block cutover if failed (penalty, stock, auth)
    high: High priority tests for correction before cutover
    medium: Medium priority tests for correction before cutover
    low: Low priority tests, can be fixed after cutover
    data_parity: Tests for data count and integrity parity
    integrity_parity: Tests for referential integrity and constraints
    calculation_parity: Tests for calculation logic parity (penalty, expected date)
    transaction_parity: Tests for transaction atomicity
    endpoint_parity: Tests for REST endpoint parity
    characterization: Characterization tests for behavior capture
    contract: Contract tests for API validation
    integration: Integration tests that hit database
    unit: Unit tests for isolated domain logic
    slow: Tests that take longer to execute

# Minimum version
minversion = 8.0

# Log options
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warning settings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning