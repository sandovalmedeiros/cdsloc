# Portas mapeadas para evitar conflitos com serviços existentes no host:
# - PostgreSQL : host 5432 (usando PostgreSQL local já migrado)
# - Redis      : host 6380 → container 6379
# - App (API)  : host 8001 → container 8000
# - Frontend   : host 3001 → container 80
#
# Configurado para usar PostgreSQL local já migrado (porta 5432)

services:
  postgres:
    image: postgres:15-alpine
    container_name: cdsloc-postgres
    environment:
      - POSTGRES_USER=cdsloc
      - POSTGRES_PASSWORD=cdsloc_password
      - POSTGRES_DB=cdsloc
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdsloc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cdsloc-network

  redis:
    image: redis:7-alpine
    container_name: cdsloc-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cdsloc-network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: app
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Conectando no PostgreSQL Docker
      - DATABASE_URL=postgresql+asyncpg://cdsloc:cdsloc_password@cdsloc-postgres:5432/cdsloc
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=30
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - cdsloc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8001
    container_name: cdsloc-frontend
    ports:
      - "3001:80"
    depends_on:
      - app
    networks:
      - cdsloc-network

volumes:
  redis_data:
  postgres_data:

networks:
  cdsloc-network:
    driver: bridge
